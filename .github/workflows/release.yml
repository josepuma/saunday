name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Bump version
        run: |
          chmod +x scripts/bump_version.sh
          ./scripts/bump_version.sh "${{ github.event.inputs.version }}"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Saunday.xcodeproj/project.pbxproj
          git commit -m "chore: bump version to ${{ github.event.inputs.version }}"
          git push

      - name: Build (Release, no signing)
        run: |
          xcodebuild \
            -project Saunday.xcodeproj \
            -scheme Saunday \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Locate built app
        id: app_path
        run: |
          APP=$(find build/DerivedData -name "Saunday.app" -maxdepth 6 | head -1)
          echo "path=$APP" >> "$GITHUB_OUTPUT"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          mkdir -p dist
          create-dmg \
            --volname "Saunday ${{ github.event.inputs.version }}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "Saunday.app" 175 190 \
            --hide-extension "Saunday.app" \
            --app-drop-link 425 190 \
            "dist/Saunday-${{ github.event.inputs.version }}.dmg" \
            "${{ steps.app_path.outputs.path }}"

      - name: Tag release
        run: |
          git tag "v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "Saunday v${{ github.event.inputs.version }}"
          body: |
            ## Saunday v${{ github.event.inputs.version }}

            ### Instalación
            1. Descarga `Saunday-${{ github.event.inputs.version }}.dmg`
            2. Abre el `.dmg` y arrastra **Saunday.app** a Aplicaciones
            3. La primera vez: click derecho → **Abrir** (necesario porque la app no está firmada)

            ### Permisos requeridos al primer inicio
            - **Screen Recording** — para capturar el audio del sistema
            - **Automation** — para leer el artwork de Music.app
          files: dist/Saunday-${{ github.event.inputs.version }}.dmg
          draft: false
          prerelease: false
